<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1410 2250" width="1410" height="2250"
     font-family="DejaVu Sans, Helvetica, Arial, sans-serif">

  <!-- ================================================================
       BACK COVER — Building Production-Grade Data Pipelines on Google Cloud
       Dimensions: 1410 × 2250
       ================================================================ -->

  <!-- 1. BACKGROUND: deep navy -->
  <rect x="0" y="80" width="1410" height="2170" fill="#0F172A"/>

  <!-- 2. TOP BAND (0–80 px): six-colour strip matching front cover -->
  <rect x="0"    y="0" width="235" height="80" fill="#3B82F6"/>
  <rect x="235"  y="0" width="235" height="80" fill="#10B981"/>
  <rect x="470"  y="0" width="235" height="80" fill="#F59E0B"/>
  <rect x="705"  y="0" width="235" height="80" fill="#8B5CF6"/>
  <rect x="940"  y="0" width="235" height="80" fill="#6B7280"/>
  <rect x="1175" y="0" width="235" height="80" fill="#EF4444"/>
  <line x1="235"  y1="0" x2="235"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="470"  y1="0" x2="470"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="705"  y1="0" x2="705"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="940"  y1="0" x2="940"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="1175" y1="0" x2="1175" y2="80" stroke="#0F172A" stroke-width="2"/>

  <!-- 3. PULL-QUOTE BLOCK (~150–400 px) -->
  <!-- Thin vertical accent bar -->
  <rect x="120" y="155" width="5" height="230" fill="#3B82F6"/>

  <!-- Pull-quote text (wrapped manually across three lines) -->
  <text x="148" y="205"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="36" font-style="italic"
        fill="#FFFFFF" text-anchor="start">&#x201C;Most teams rebuild the same scaffolding three times</text>
  <text x="148" y="254"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="36" font-style="italic"
        fill="#FFFFFF" text-anchor="start">before they admit it. This book is what should</text>
  <text x="148" y="303"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="36" font-style="italic"
        fill="#FFFFFF" text-anchor="start">have been there from the start.&#x201D;</text>

  <!-- Thin rule below pull-quote -->
  <line x1="120" y1="400" x2="1290" y2="400" stroke="#334155" stroke-width="1.5"/>

  <!-- 4. BODY BLURB (~450–1500 px)
       Approximately 600 words, rendered as wrapped lines at 22pt with line-height ~1.4 (~31px per line).
       Left margin 120, right margin 1290 (inner width ~1170 px at 22pt ≈ ~54 chars/line).
       Lines are manually broken to fit. -->

  <!-- Para 1: The mainframe-to-cloud problem -->
  <text x="120" y="465" font-size="22" fill="#FFFFFF" text-anchor="start">Every organisation migrating from a mainframe or legacy ETL platform faces the</text>
  <text x="120" y="496" font-size="22" fill="#FFFFFF" text-anchor="start">same invisible tax: a sprawl of hand-rolled pipeline scaffolding that no two</text>
  <text x="120" y="527" font-size="22" fill="#FFFFFF" text-anchor="start">engineers built the same way. Schema drift swallowed in silence. Run IDs that</text>
  <text x="120" y="558" font-size="22" fill="#FFFFFF" text-anchor="start">never propagated past the first hop. Cost spikes that only surfaced in the</text>
  <text x="120" y="589" font-size="22" fill="#FFFFFF" text-anchor="start">monthly billing email. Google Cloud offers world-class primitives &#x2014; Dataflow,</text>
  <text x="120" y="620" font-size="22" fill="#FFFFFF" text-anchor="start">BigQuery, Cloud Composer, Pub/Sub &#x2014; but primitives are not architecture.</text>

  <!-- Para 2: The framework's answer -->
  <text x="120" y="682" font-size="22" fill="#FFFFFF" text-anchor="start">This book documents the opinionated answer built over five years of production</text>
  <text x="120" y="713" font-size="22" fill="#FFFFFF" text-anchor="start">GCP work: the gcp-pipeline-framework. Six composable Python libraries sharing</text>
  <text x="120" y="744" font-size="22" fill="#FFFFFF" text-anchor="start">a single design contract. Schema is the source of truth &#x2014; declared once,</text>
  <text x="120" y="775" font-size="22" fill="#FFFFFF" text-anchor="start">validated everywhere, and never silently coerced. Every pipeline write carries</text>
  <text x="120" y="806" font-size="22" fill="#FFFFFF" text-anchor="start">a run ID from the first Beam DoFn through to the final BigQuery partition,</text>
  <text x="120" y="837" font-size="22" fill="#FFFFFF" text-anchor="start">making lineage and re-run semantics trivial. Deployment is structured as three</text>
  <text x="120" y="868" font-size="22" fill="#FFFFFF" text-anchor="start">independent units &#x2014; Ingestion, Transformation, Orchestration &#x2014; each releasable</text>
  <text x="120" y="899" font-size="22" fill="#FFFFFF" text-anchor="start">on its own cadence without breaking the others. And FinOps is a first-class</text>
  <text x="120" y="930" font-size="22" fill="#FFFFFF" text-anchor="start">concern baked into the framework&#x2019;s cost guardrails, not an afterthought in</text>
  <text x="120" y="961" font-size="22" fill="#FFFFFF" text-anchor="start">a post-mortem. The result is a system that scales from a single developer to a</text>
  <text x="120" y="992" font-size="22" fill="#FFFFFF" text-anchor="start">distributed team, and from a prototype to a regulated production workload.</text>

  <!-- Para 3: What's inside -->
  <text x="120" y="1054" font-size="22" fill="#FFFFFF" text-anchor="start">Inside you will find: a ground-up walkthrough of each library&#x2019;s design</text>
  <text x="120" y="1085" font-size="22" fill="#FFFFFF" text-anchor="start">rationale; Terraform and GitHub Actions templates you can fork today; a frank</text>
  <text x="120" y="1116" font-size="22" fill="#FFFFFF" text-anchor="start">code-review chapter that names the recurring mistakes (and shows the diffs</text>
  <text x="120" y="1147" font-size="22" fill="#FFFFFF" text-anchor="start">that fix them); a FinOps playbook with cost-gate patterns for Dataflow and</text>
  <text x="120" y="1178" font-size="22" fill="#FFFFFF" text-anchor="start">Composer; and twenty-five years of engineering context that explains not just</text>
  <text x="120" y="1209" font-size="22" fill="#FFFFFF" text-anchor="start">what the framework does but why it was built the way it was. The opinions</text>
  <text x="120" y="1240" font-size="22" fill="#FFFFFF" text-anchor="start">in this book are earned, not borrowed.</text>

  <!-- Para 4: Who it's for -->
  <text x="120" y="1302" font-size="22" fill="#FFFFFF" text-anchor="start">This book is written for mid-level data engineers who are tired of re-inventing</text>
  <text x="120" y="1333" font-size="22" fill="#FFFFFF" text-anchor="start">pipeline boilerplate; experienced GCP engineers who want a reference</text>
  <text x="120" y="1364" font-size="22" fill="#FFFFFF" text-anchor="start">architecture they can defend to a CTO; and architects evaluating mainframe-to-</text>
  <text x="120" y="1395" font-size="22" fill="#FFFFFF" text-anchor="start">GCP migration strategies who need more than a vendor white-paper. If you</text>
  <text x="120" y="1426" font-size="22" fill="#FFFFFF" text-anchor="start">have ever shipped a pipeline to production and felt the quiet dread of touching</text>
  <text x="120" y="1457" font-size="22" fill="#FFFFFF" text-anchor="start">it six months later, this book was written for you.</text>

  <!-- 5. AUTHOR BIO STRIP (~1550–1850 px) -->
  <line x1="120" y1="1530" x2="1290" y2="1530" stroke="#334155" stroke-width="1.5"/>

  <text x="120" y="1585" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="start">About the Author</text>

  <text x="120" y="1630" font-size="20" fill="#FFFFFF" text-anchor="start">Joseph Aruja is a Senior Lead Engineer with twenty-five years of experience designing</text>
  <text x="120" y="1660" font-size="20" fill="#FFFFFF" text-anchor="start">distributed systems across mainframe, middleware, and cloud platforms. He is the author</text>
  <text x="120" y="1690" font-size="20" fill="#FFFFFF" text-anchor="start">of JSR 255 (JMX), contributed to NHS Spine Release 7A, and has led GCP data platform</text>
  <text x="120" y="1720" font-size="20" fill="#FFFFFF" text-anchor="start">programmes for organisations in financial services and regulated healthcare. He is based</text>
  <text x="120" y="1750" font-size="20" fill="#FFFFFF" text-anchor="start">in Leeds, UK.</text>

  <!-- 6. ISBN / PUBLISHER FOOTER (~1900–2150 px) -->
  <line x1="120" y1="1860" x2="1290" y2="1860" stroke="#334155" stroke-width="1.5"/>

  <text x="705" y="1940" font-size="16" fill="#94A3B8" text-anchor="middle">ISBN &lt;PLACEHOLDER&gt;</text>
  <text x="705" y="1970" font-size="16" fill="#94A3B8" text-anchor="middle">Published by Good Shepherd Press &#xB7; 2026</text>

