<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1410 2250" width="1410" height="2250"
     font-family="DejaVu Sans, Helvetica, Arial, sans-serif">

  <!-- ================================================================
       FRONT COVER — Building Production-Grade Data Pipelines on Google Cloud
       Dimensions: 1410 × 2250  (Google Play Books / Amazon KDP)
       ================================================================ -->

  <!-- 1. BACKGROUND: deep navy -->
  <rect x="0" y="80" width="1410" height="2070" fill="#0F172A"/>

  <!-- 2. TOP BAND (0–80 px): six-colour strip for the six framework libraries -->
  <rect x="0"    y="0" width="235" height="80" fill="#3B82F6"/><!-- blue   -->
  <rect x="235"  y="0" width="235" height="80" fill="#10B981"/><!-- green  -->
  <rect x="470"  y="0" width="235" height="80" fill="#F59E0B"/><!-- yellow -->
  <rect x="705"  y="0" width="235" height="80" fill="#8B5CF6"/><!-- purple -->
  <rect x="940"  y="0" width="235" height="80" fill="#6B7280"/><!-- grey   -->
  <rect x="1175" y="0" width="235" height="80" fill="#EF4444"/><!-- red    -->

  <!-- Thin divider lines within the top band for visual separation -->
  <line x1="235"  y1="0" x2="235"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="470"  y1="0" x2="470"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="705"  y1="0" x2="705"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="940"  y1="0" x2="940"  y2="80" stroke="#0F172A" stroke-width="2"/>
  <line x1="1175" y1="0" x2="1175" y2="80" stroke="#0F172A" stroke-width="2"/>

  <!-- 3. TITLE BLOCK (~150–700 px from top) -->
  <!-- Line 1 -->
  <text x="120" y="250"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700"
        fill="#FFFFFF" text-anchor="start">Building Production-Grade</text>
  <!-- Line 2 -->
  <text x="120" y="347"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700"
        fill="#FFFFFF" text-anchor="start">Data Pipelines</text>
  <!-- Line 3 -->
  <text x="120" y="444"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="92" font-weight="700"
        fill="#FFFFFF" text-anchor="start">on Google Cloud</text>

  <!-- Thin accent rule below title -->
  <rect x="120" y="480" width="1170" height="3" fill="#3B82F6" opacity="0.6"/>

  <!-- 4. SUBTITLE BLOCK (~750–850 px) -->
  <text x="120" y="560"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="36" font-weight="600" font-style="italic"
        fill="#FFFFFF" fill-opacity="0.80" text-anchor="start">A Developer&#x2019;s Field Guide to the gcp-pipeline-framework</text>

  <!-- 5. CENTRAL MOTIF: Three-Unit Deployment Model (~900–1650 px) -->

  <!-- Box dimensions: ~280 wide × ~480 tall, spaced evenly in 1410 px -->
  <!-- Centers at x=245, 705, 1165; left edges at 105, 565, 1025 -->

  <!-- ── INGESTION BOX (green) ── -->
  <rect x="105" y="900" width="280" height="480"
        rx="18" ry="18"
        fill="#064E3B" stroke="#10B981" stroke-width="3"/>
  <text x="245" y="1160"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">Ingestion</text>
  <!-- Decorative inner icon suggestion: stacked lines -->
  <line x1="165" y1="1000" x2="325" y2="1000" stroke="#10B981" stroke-width="2" opacity="0.5"/>
  <line x1="165" y1="1020" x2="325" y2="1020" stroke="#10B981" stroke-width="2" opacity="0.4"/>
  <line x1="165" y1="1040" x2="325" y2="1040" stroke="#10B981" stroke-width="2" opacity="0.3"/>
  <rect x="155" y="1080" width="180" height="60" rx="8"
        fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="1.5"/>
  <text x="245" y="1117"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="700"
        fill="#10B981" text-anchor="middle">BEAM</text>
  <!-- Caption below box -->
  <text x="245" y="1410"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="16"
        fill="#94A3B8" text-anchor="middle">Dataflow</text>

  <!-- Arrow: Ingestion → Transformation -->
  <line x1="388" y1="1140" x2="562" y2="1140" stroke="#6B7280" stroke-width="2.5"/>
  <polygon points="562,1133 578,1140 562,1147" fill="#6B7280"/>

  <!-- ── TRANSFORMATION BOX (yellow) ── -->
  <rect x="565" y="900" width="280" height="480"
        rx="18" ry="18"
        fill="#78350F" stroke="#F59E0B" stroke-width="3"/>
  <text x="705" y="1160"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">Transformation</text>
  <!-- Decorative inner icon suggestion -->
  <line x1="625" y1="1000" x2="785" y2="1000" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>
  <line x1="625" y1="1020" x2="785" y2="1020" stroke="#F59E0B" stroke-width="2" opacity="0.4"/>
  <line x1="625" y1="1040" x2="785" y2="1040" stroke="#F59E0B" stroke-width="2" opacity="0.3"/>
  <rect x="615" y="1080" width="180" height="60" rx="8"
        fill="#F59E0B" fill-opacity="0.15" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="705" y="1117"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="700"
        fill="#F59E0B" text-anchor="middle">SQL</text>
  <!-- Caption below box -->
  <text x="705" y="1410"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="16"
        fill="#94A3B8" text-anchor="middle">dbt</text>

  <!-- Arrow: Transformation → Orchestration -->
  <line x1="848" y1="1140" x2="1022" y2="1140" stroke="#6B7280" stroke-width="2.5"/>
  <polygon points="1022,1133 1038,1140 1022,1147" fill="#6B7280"/>

  <!-- ── ORCHESTRATION BOX (purple) ── -->
  <rect x="1025" y="900" width="280" height="480"
        rx="18" ry="18"
        fill="#4C1D95" stroke="#8B5CF6" stroke-width="3"/>
  <text x="1165" y="1160"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700"
        fill="#FFFFFF" text-anchor="middle">Orchestration</text>
  <!-- Decorative inner icon suggestion -->
  <line x1="1085" y1="1000" x2="1245" y2="1000" stroke="#8B5CF6" stroke-width="2" opacity="0.5"/>
  <line x1="1085" y1="1020" x2="1245" y2="1020" stroke="#8B5CF6" stroke-width="2" opacity="0.4"/>
  <line x1="1085" y1="1040" x2="1245" y2="1040" stroke="#8B5CF6" stroke-width="2" opacity="0.3"/>
  <rect x="1075" y="1080" width="180" height="60" rx="8"
        fill="#8B5CF6" fill-opacity="0.15" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="1165" y="1117"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="18" font-weight="700"
        fill="#8B5CF6" text-anchor="middle">DAG</text>
  <!-- Caption below box -->
  <text x="1165" y="1410"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="16"
        fill="#94A3B8" text-anchor="middle">Airflow</text>

  <!-- Thin horizontal rule below the three boxes + captions -->
  <line x1="120" y1="1445" x2="1290" y2="1445" stroke="#334155" stroke-width="1.5"/>

  <!-- Caption below rule -->
  <text x="705" y="1490"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="22" font-style="italic"
        fill="#FFFFFF" text-anchor="middle">the three-unit deployment model</text>

  <!-- 6. AUTHOR BLOCK (~1900–2050 px) -->
  <text x="120" y="1980"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="56" font-weight="700"
        fill="#FFFFFF" text-anchor="start">Joseph Aruja</text>
  <text x="120" y="2040"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="26" font-style="italic"
        fill="#FFFFFF" fill-opacity="0.70" text-anchor="start">Senior Lead Engineer &#xB7; JSR 255 (JMX) &#xB7; 25 years</text>

  <!-- 7. BOTTOM BAND (~2150–2250 px): charcoal -->
  <rect x="0" y="2150" width="1410" height="100" fill="#1E293B"/>
  <text x="705" y="2210"
        font-family="DejaVu Sans, Helvetica, Arial, sans-serif"
        font-size="18"
        fill="#94A3B8" text-anchor="middle">Published by Good Shepherd Press &#xB7; 2026</text>

</svg>
