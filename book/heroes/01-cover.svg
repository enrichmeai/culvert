<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400"
     font-family="DejaVu Sans, Helvetica, Arial, sans-serif">

  <defs>
    <!-- Arrow marker (filled triangle, reusable) -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#2563EB"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#10B981"/>
    </marker>
    <marker id="arrow-grey" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1600" height="400" fill="#ffffff"/>

  <!-- Subtle top border in blue -->
  <rect x="0" y="0" width="1600" height="4" fill="#2563EB"/>

  <!-- ── TECH STACK LABEL (top centre) ── -->
  <text x="800" y="28" text-anchor="middle" font-size="13" fill="#6B7280" letter-spacing="2">Beam · dbt · Airflow · Terraform · GCP</text>

  <!-- ══════════════════════════════════════════════════════════
       LEFT: MAINFRAME tall blue rectangle
       x=40..260  y=50..360  (220 wide, 310 tall)
       ══════════════════════════════════════════════════════════ -->
  <rect x="40" y="50" width="220" height="310" rx="6"
        fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>

  <!-- MAINFRAME label at top -->
  <text x="150" y="76" text-anchor="middle" font-size="12" font-weight="bold"
        fill="#2563EB" letter-spacing="2">MAINFRAME</text>

  <!-- Fixed-width record rows -->
  <!-- HDR row -->
  <rect x="56" y="88" width="188" height="22" rx="2" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="64" y="104" font-size="10" fill="#1D4ED8" font-family="Courier New, monospace">HDR|20240101|BATCH001</text>

  <!-- Data rows -->
  <rect x="56" y="116" width="188" height="18" rx="2" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="64" y="129" font-size="9" fill="#2563EB" font-family="Courier New, monospace">001|SMITH    |JOHN |EUR</text>

  <rect x="56" y="138" width="188" height="18" rx="2" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="64" y="151" font-size="9" fill="#2563EB" font-family="Courier New, monospace">002|JONES    |MARY |GBP</text>

  <rect x="56" y="160" width="188" height="18" rx="2" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="64" y="173" font-size="9" fill="#2563EB" font-family="Courier New, monospace">003|NGUYEN   |PAUL |USD</text>

  <rect x="56" y="182" width="188" height="18" rx="2" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="64" y="195" font-size="9" fill="#2563EB" font-family="Courier New, monospace">004|GARCIA   |ANNA |EUR</text>

  <rect x="56" y="204" width="188" height="18" rx="2" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
  <text x="64" y="217" font-size="9" fill="#2563EB" font-family="Courier New, monospace">005|BROWN    |LISA |GBP</text>

  <!-- ellipsis rows -->
  <text x="150" y="238" text-anchor="middle" font-size="12" fill="#93C5FD">· · ·</text>

  <!-- TRL row -->
  <rect x="56" y="248" width="188" height="22" rx="2" fill="#BFDBFE" stroke="#93C5FD" stroke-width="1"/>
  <text x="64" y="264" font-size="10" fill="#1D4ED8" font-family="Courier New, monospace">TRL|00005|END</text>

  <!-- file label at bottom -->
  <text x="150" y="340" text-anchor="middle" font-size="10" fill="#6B7280">daily_extract_20240101.dat</text>
  <text x="150" y="354" text-anchor="middle" font-size="9" fill="#9CA3AF">fixed-width EBCDIC</text>

  <!-- ══════════════════════════════════════════════════════════
       BOLD ARROW mainframe → cloud
       ══════════════════════════════════════════════════════════ -->
  <line x1="264" y1="200" x2="350" y2="200" stroke="#2563EB" stroke-width="2.5"
        marker-end="url(#arrow)"/>

  <!-- ══════════════════════════════════════════════════════════
       CENTRE: gcp-pipeline-framework cloud shape
       Cloud = large rounded rect  x=360..1070  y=90..330
       ══════════════════════════════════════════════════════════ -->

  <!-- Cloud bumps (three overlapping circles at top of cloud) -->
  <ellipse cx="490" cy="112" rx="60" ry="32" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <ellipse cx="600" cy="96" rx="80" ry="38" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <ellipse cx="720" cy="104" rx="70" ry="34" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
  <ellipse cx="820" cy="112" rx="55" ry="30" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

  <!-- Main cloud body -->
  <rect x="360" y="116" width="710" height="210" rx="16"
        fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

  <!-- Cloud bottom arc -->
  <rect x="360" y="296" width="710" height="40" rx="0" fill="#D1FAE5"/>
  <rect x="360" y="310" width="710" height="16" rx="8" fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

  <!-- Framework name -->
  <text x="715" y="148" text-anchor="middle" font-size="16" font-weight="bold"
        fill="#065F46" letter-spacing="1">gcp-pipeline-framework</text>

  <!-- Three inset stage boxes inside the cloud -->
  <!-- Ingestion box -->
  <rect x="390" y="162" width="190" height="70" rx="6"
        fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
  <text x="485" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">Ingestion</text>
  <text x="485" y="214" text-anchor="middle" font-size="10" fill="#3B82F6">Beam · GCS · Pub/Sub</text>

  <!-- Arrow Ingestion -> Transformation -->
  <line x1="582" y1="197" x2="608" y2="197" stroke="#2563EB" stroke-width="2"
        marker-end="url(#arrow)"/>

  <!-- Transformation box -->
  <rect x="612" y="162" width="190" height="70" rx="6"
        fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="707" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Transformation</text>
  <text x="707" y="214" text-anchor="middle" font-size="10" fill="#B45309">dbt · Dataform</text>

  <!-- Arrow Transformation -> Orchestration -->
  <line x1="804" y1="197" x2="830" y2="197" stroke="#2563EB" stroke-width="2"
        marker-end="url(#arrow)"/>

  <!-- Orchestration box -->
  <rect x="834" y="162" width="190" height="70" rx="6"
        fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="929" y="196" text-anchor="middle" font-size="13" font-weight="bold" fill="#4C1D95">Orchestration</text>
  <text x="929" y="214" text-anchor="middle" font-size="10" fill="#7C3AED">Composer · Airflow</text>

  <!-- ── BOLD ARROW cloud → BigQuery ── -->
  <line x1="1074" y1="210" x2="1145" y2="210" stroke="#10B981" stroke-width="2.5"
        marker-end="url(#arrow-green)"/>

  <!-- ══════════════════════════════════════════════════════════
       RIGHT: BigQuery cylinder
       ══════════════════════════════════════════════════════════ -->

  <!-- Cylinder body -->
  <rect x="1148" y="155" width="190" height="120" rx="8"
        fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>

  <!-- Cylinder top ellipse (cap) -->
  <ellipse cx="1243" cy="155" rx="95" ry="18"
           fill="#A7F3D0" stroke="#10B981" stroke-width="2"/>

  <!-- Cylinder bottom ellipse -->
  <ellipse cx="1243" cy="275" rx="95" ry="18"
           fill="#6EE7B7" stroke="#10B981" stroke-width="2"/>

  <!-- BigQuery label -->
  <text x="1243" y="210" text-anchor="middle" font-size="15" font-weight="bold" fill="#065F46">BigQuery</text>
  <text x="1243" y="230" text-anchor="middle" font-size="10" fill="#047857">Data Warehouse</text>

  <!-- ── Decorative dotted arc: cloud → You (top-right) ── -->
  <!-- Dotted line from cloud top-right corner to "You" box -->
  <path d="M 1070 130 Q 1310 40 1420 80"
        fill="none" stroke="#8B5CF6" stroke-width="1.5" stroke-dasharray="5,4"/>
  <!-- Arrowhead at end of arc -->
  <polygon points="1416,68 1426,82 1410,86" fill="#8B5CF6"/>

  <!-- "You" box (top-right) -->
  <rect x="1428" y="54" width="120" height="46" rx="6"
        fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
  <text x="1488" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#4C1D95">You</text>
  <text x="1488" y="90" text-anchor="middle" font-size="9" fill="#7C3AED">shipped it</text>

  <!-- Bottom label -->
  <rect x="0" y="396" width="1600" height="4" fill="#10B981"/>
</svg>
