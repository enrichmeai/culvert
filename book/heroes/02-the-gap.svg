<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400"
     font-family="DejaVu Sans, Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#EF4444"/>
    </marker>
  </defs>

  <!-- White background -->
  <rect width="1600" height="400" fill="#ffffff"/>
  <rect x="0" y="0" width="1600" height="4" fill="#EF4444"/>

  <!-- ═══════════════════════════════════════════════════════════
       LEFT HALF: 4×2 grid of service tiles, slightly rotated
       Each tile ~155 wide × 80 tall; columns at x=42,210,378,546
       Rows at y=60,162; bottom row y=262 (only first 4 from spec)
       ═══════════════════════════════════════════════════════════ -->

  <!-- Row 1, Col 1: Cloud Storage — blue, tilt -2deg -->
  <g transform="rotate(-2,119,100)">
    <rect x="42" y="60" width="155" height="80" rx="8"
          fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="119" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">Cloud Storage</text>
    <text x="119" y="114" text-anchor="middle" font-size="10" fill="#3B82F6">GCS</text>
  </g>

  <!-- Row 1, Col 2: Pub/Sub — yellow, tilt +1.5deg -->
  <g transform="rotate(1.5,287,100)">
    <rect x="210" y="60" width="155" height="80" rx="8"
          fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="287" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Pub/Sub</text>
    <text x="287" y="114" text-anchor="middle" font-size="10" fill="#B45309">messaging</text>
  </g>

  <!-- Row 1, Col 3: Dataflow — purple, tilt -1.5deg -->
  <g transform="rotate(-1.5,455,100)">
    <rect x="378" y="60" width="155" height="80" rx="8"
          fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <text x="455" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#4C1D95">Dataflow</text>
    <text x="455" y="114" text-anchor="middle" font-size="10" fill="#7C3AED">Apache Beam</text>
  </g>

  <!-- Row 1, Col 4: BigQuery — green, tilt +2deg -->
  <g transform="rotate(2,623,100)">
    <rect x="546" y="60" width="155" height="80" rx="8"
          fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="623" y="96" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">BigQuery</text>
    <text x="623" y="114" text-anchor="middle" font-size="10" fill="#047857">data warehouse</text>
  </g>

  <!-- Row 2, Col 1: Composer — yellow, tilt +1deg -->
  <g transform="rotate(1,119,212)">
    <rect x="42" y="162" width="155" height="80" rx="8"
          fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
    <text x="119" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#92400E">Composer</text>
    <text x="119" y="216" text-anchor="middle" font-size="10" fill="#B45309">managed Airflow</text>
  </g>

  <!-- Row 2, Col 2: Cloud Functions — purple, tilt -2deg -->
  <g transform="rotate(-2,287,202)">
    <rect x="210" y="162" width="155" height="80" rx="8"
          fill="#EDE9FE" stroke="#8B5CF6" stroke-width="2"/>
    <text x="287" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#4C1D95">Cloud Functions</text>
    <text x="287" y="216" text-anchor="middle" font-size="10" fill="#7C3AED">serverless</text>
  </g>

  <!-- Row 2, Col 3: Cloud Run — blue, tilt +1.5deg -->
  <g transform="rotate(1.5,455,202)">
    <rect x="378" y="162" width="155" height="80" rx="8"
          fill="#DBEAFE" stroke="#2563EB" stroke-width="2"/>
    <text x="455" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#1E40AF">Cloud Run</text>
    <text x="455" y="216" text-anchor="middle" font-size="10" fill="#3B82F6">containers</text>
  </g>

  <!-- Row 2, Col 4: Dataform — green, tilt -1deg -->
  <g transform="rotate(-1,623,202)">
    <rect x="546" y="162" width="155" height="80" rx="8"
          fill="#D1FAE5" stroke="#10B981" stroke-width="2"/>
    <text x="623" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">Dataform</text>
    <text x="623" y="216" text-anchor="middle" font-size="10" fill="#047857">SQL transforms</text>
  </g>

  <!-- Label under the tiles -->
  <text x="360" y="290" text-anchor="middle" font-size="11" fill="#6B7280" letter-spacing="2">GCP SERVICES — ALL THE PIECES</text>

  <!-- ═══════════════════════════════════════════════════════════
       CENTRE: Wide horizontal arrow with red ! / ? above it
       ═══════════════════════════════════════════════════════════ -->

  <!-- Arrow shaft from left tile area to right hole -->
  <line x1="720" y1="200" x2="868" y2="200" stroke="#EF4444" stroke-width="2.5"
        marker-end="url(#arrow-red)"/>

  <!-- Red warning badge above arrow -->
  <circle cx="794" cy="160" r="24" fill="#FEE2E2" stroke="#EF4444" stroke-width="2"/>
  <text x="794" y="153" text-anchor="middle" font-size="20" font-weight="bold" fill="#EF4444">!</text>
  <text x="794" y="174" text-anchor="middle" font-size="13" fill="#EF4444">?</text>

  <text x="794" y="238" text-anchor="middle" font-size="10" fill="#EF4444">no binding glue</text>

  <!-- ═══════════════════════════════════════════════════════════
       RIGHT HALF: Dotted "Framework-shaped hole" rectangle
       x=878..1555  y=50..350
       ═══════════════════════════════════════════════════════════ -->

  <!-- Outer dotted border -->
  <rect x="878" y="50" width="682" height="300" rx="12"
        fill="#F3F4F6" stroke="#6B7280" stroke-width="2.5" stroke-dasharray="12,6"/>

  <!-- Italic title inside the hole -->
  <text x="1219" y="100" text-anchor="middle" font-size="17"
        font-style="italic" fill="#6B7280">Framework-shaped hole</text>

  <!-- Horizontal divider -->
  <line x1="910" y1="116" x2="1528" y2="116" stroke="#D1D5DB" stroke-width="1"/>

  <!-- Five concern labels inside the hole — larger, spaced vertically -->
  <text x="1219" y="158" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="1">Audit</text>
  <text x="1219" y="194" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="1">FinOps</text>
  <text x="1219" y="230" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="1">Errors</text>
  <text x="1219" y="266" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="1">Schema</text>
  <text x="1219" y="302" text-anchor="middle" font-size="14" fill="#9CA3AF" letter-spacing="1">Reconciliation</text>

  <!-- Subtitle at bottom of right pane -->
  <text x="1219" y="336" text-anchor="middle" font-size="11" fill="#6B7280">The connective tissue no single GCP service provides.</text>

  <!-- Bottom border accent -->
  <rect x="0" y="396" width="1600" height="4" fill="#EF4444"/>
</svg>
