{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.grafana.dashboardsConfigMap }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pipeline-observability.labels" . | nindent 4 }}
    app: grafana
data:
  pipeline-overview.json: |
    {
      "annotations": {
        "list": []
      },
      "description": "Pipeline overview dashboard",
      "editable": true,
      "gnetId": null,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          },
          "gridPos": {
            "h": 8,
            "w": 12,
            "x": 0,
            "y": 0
          },
          "id": 1,
          "options": {},
          "targets": [
            {
              "expr": "up",
              "refId": "A"
            }
          ],
          "title": "Pipeline Status",
          "type": "stat"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "style": "dark",
      "tags": ["pipeline"],
      "templating": {
        "list": [
          {
            "name": "system_id",
            "type": "constant",
            "label": "System ID",
            "query": "default",
            "current": { "value": "default", "text": "default" },
            "hide": 0
          },
          {
            "name": "environment",
            "type": "custom",
            "label": "Environment",
            "query": "dev,staging,prod",
            "current": { "value": "prod", "text": "prod" },
            "hide": 0
          },
          {
            "name": "entity",
            "type": "custom",
            "label": "Entity",
            "query": "All",
            "current": { "value": "$__all", "text": "All" },
            "includeAll": true,
            "multi": true,
            "hide": 0
          }
        ]
      },
      "time": {
        "from": "now-24h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "Pipeline overview",
      "uid": "pipeline-overview",
      "version": 2
    }

  per-entity-throughput.json: |
    {
      "annotations": { "list": [] },
      "description": "Rows ingested per entity per hour — throughput trends, totals, and top-10 ranking.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 10,
          "title": "Summary",
          "type": "row"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["sum"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum(increase(pipeline_records_processed_total{environment=\"$environment\"}[24h]))",
              "legendFormat": "Total records",
              "refId": "A"
            }
          ],
          "title": "Total Records Ingested (last 24h)",
          "type": "stat"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["mean"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum(rate(pipeline_records_processed_total{environment=\"$environment\"}[1h])) * 3600",
              "legendFormat": "Records/hour",
              "refId": "A"
            }
          ],
          "title": "Current Ingest Rate (records/hour)",
          "type": "stat"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "count(count by (entity) (pipeline_records_processed_total{environment=\"$environment\"}))",
              "legendFormat": "Active entities",
              "refId": "A"
            }
          ],
          "title": "Active Entities",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 11,
          "title": "Throughput Over Time",
          "type": "row"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "Records / hour",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum by (entity) (rate(pipeline_records_processed_total{environment=\"$environment\", entity=~\"$entity\"}[1h])) * 3600",
              "legendFormat": "{{ entity }}",
              "refId": "A"
            }
          ],
          "title": "Records Ingested per Entity (per hour)",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 12,
          "title": "Top Entities (7d)",
          "type": "row"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "Total records",
                "fillOpacity": 80
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "id": 5,
          "options": {
            "barRadius": 0.05,
            "groupWidth": 0.7,
            "legend": { "displayMode": "list", "placement": "bottom" },
            "orientation": "horizontal",
            "tooltip": { "mode": "single" },
            "xTickLabelRotation": 0,
            "xTickLabelSpacing": 200
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "topk(10, sum by (entity) (increase(pipeline_records_processed_total{environment=\"$environment\"}[7d])))",
              "legendFormat": "{{ entity }}",
              "refId": "A",
              "instant": true
            }
          ],
          "title": "Top 10 Entities by Volume (last 7d)",
          "type": "barchart"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 38,
      "tags": ["pipeline", "throughput", "entity"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Prometheus",
            "hide": 0,
            "current": {}
          },
          {
            "name": "system_id",
            "type": "constant",
            "label": "System ID",
            "query": "default",
            "current": { "value": "default", "text": "default" },
            "hide": 0
          },
          {
            "name": "environment",
            "type": "custom",
            "label": "Environment",
            "query": "dev,staging,prod",
            "current": { "value": "prod", "text": "prod" },
            "hide": 0
          },
          {
            "name": "entity",
            "type": "query",
            "label": "Entity",
            "datasource": "${DS_PROMETHEUS}",
            "query": "label_values(pipeline_records_processed_total, entity)",
            "current": { "value": "$__all", "text": "All" },
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "hide": 0
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Per-Entity Throughput",
      "uid": "per-entity-throughput",
      "version": 1
    }

  per-entity-error-rate.json: |
    {
      "annotations": { "list": [] },
      "description": "Error and rejection rates per entity — time-series, current rate stat, and latest audit events.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 20,
          "title": "Summary",
          "type": "row"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              },
              "unit": "percentunit",
              "max": 1,
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum(rate(pipeline_records_rejected_total{environment=\"$environment\"}[5m])) / sum(rate(pipeline_records_processed_total{environment=\"$environment\"}[5m]))",
              "legendFormat": "Error rate",
              "refId": "A"
            }
          ],
          "title": "Current Overall Error Rate",
          "type": "stat"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 8, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["sum"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum(increase(pipeline_records_rejected_total{environment=\"$environment\"}[24h]))",
              "legendFormat": "Rejected records",
              "refId": "A"
            }
          ],
          "title": "Total Rejected Records (last 24h)",
          "type": "stat"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 8, "x": 16, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "count(sum by (entity) (rate(pipeline_records_rejected_total{environment=\"$environment\"}[5m])) > 0)",
              "legendFormat": "Entities with errors",
              "refId": "A"
            }
          ],
          "title": "Entities with Active Errors",
          "type": "stat"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 },
          "id": 21,
          "title": "Error Rate Over Time",
          "type": "row"
        },
        {
          "datasource": "${DS_PROMETHEUS}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "Error rate",
                "axisPlacement": "auto",
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "lineInterpolation": "smooth",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "never",
                "spanNulls": false
              },
              "unit": "percentunit",
              "max": 1,
              "min": 0
            },
            "overrides": []
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 6 },
          "id": 4,
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "targets": [
            {
              "datasource": "${DS_PROMETHEUS}",
              "expr": "sum by (entity) (rate(pipeline_records_rejected_total{environment=\"$environment\", entity=~\"$entity\"}[5m])) / sum by (entity) (rate(pipeline_records_processed_total{environment=\"$environment\", entity=~\"$entity\"}[5m]))",
              "legendFormat": "{{ entity }}",
              "refId": "A"
            }
          ],
          "title": "Error Rate by Entity",
          "type": "timeseries"
        },
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 },
          "id": 22,
          "title": "Latest Audit Events",
          "type": "row"
        },
        {
          "datasource": "${DS_BIGQUERY}",
          "fieldConfig": {
            "defaults": {
              "custom": {
                "align": "auto",
                "displayMode": "auto"
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "event_ts" },
                "properties": [
                  { "id": "custom.width", "value": 180 },
                  { "id": "unit", "value": "time: YYYY-MM-DD HH:mm:ss" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "error_message" },
                "properties": [{ "id": "custom.width", "value": 400 }]
              }
            ]
          },
          "gridPos": { "h": 8, "w": 24, "x": 0, "y": 15 },
          "id": 5,
          "options": {
            "footer": { "show": false },
            "frameIndex": 0,
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "event_ts" }]
          },
          "targets": [
            {
              "datasource": "${DS_BIGQUERY}",
              "rawQuery": true,
              "rawSql": "SELECT event_ts, entity, error_code, error_message, records_rejected, records_processed FROM `${project}.job_control.audit_events` WHERE event_type = 'REJECTION' AND environment = '${environment}' ORDER BY event_ts DESC LIMIT 25",
              "refId": "A",
              "format": "table"
            }
          ],
          "title": "Latest 25 Error / Rejection Events",
          "type": "table"
        }
      ],
      "refresh": "1m",
      "schemaVersion": 38,
      "tags": ["pipeline", "errors", "quality", "entity"],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "pluginId": "prometheus",
            "label": "Prometheus",
            "hide": 0,
            "current": {}
          },
          {
            "name": "DS_BIGQUERY",
            "type": "datasource",
            "pluginId": "grafana-bigquery-datasource",
            "label": "BigQuery",
            "hide": 0,
            "current": {}
          },
          {
            "name": "system_id",
            "type": "constant",
            "label": "System ID",
            "query": "default",
            "current": { "value": "default", "text": "default" },
            "hide": 0
          },
          {
            "name": "environment",
            "type": "custom",
            "label": "Environment",
            "query": "dev,staging,prod",
            "current": { "value": "prod", "text": "prod" },
            "hide": 0
          },
          {
            "name": "entity",
            "type": "query",
            "label": "Entity",
            "datasource": "${DS_PROMETHEUS}",
            "query": "label_values(pipeline_records_processed_total, entity)",
            "current": { "value": "$__all", "text": "All" },
            "includeAll": true,
            "multi": true,
            "refresh": 2,
            "hide": 0
          },
          {
            "name": "project",
            "type": "constant",
            "label": "GCP Project",
            "query": "my-gcp-project",
            "current": { "value": "my-gcp-project", "text": "my-gcp-project" },
            "hide": 0
          }
        ]
      },
      "time": { "from": "now-24h", "to": "now" },
      "timepicker": {},
      "timezone": "browser",
      "title": "Per-Entity Error Rate",
      "uid": "per-entity-error-rate",
      "version": 1
    }

  per-run-cost.json: |
    {
      "annotations": { "list": [] },
      "description": "FinOps per-run cost breakdown — by service, total monthly spend, top entities, and hourly heatmap.",
      "editable": true,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "collapsed": false,
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
          "id": 30,
          "title": "Monthly Summary",
          "type": "row"
        },
        {
          "datasource": "${DS_BIGQUERY}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 500 },
                  { "color": "red", "value": 2000 }
                ]
              },
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 1 },
          "id": 1,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["sum"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_BIGQUERY}",
              "rawQuery": true,
              "rawSql": "SELECT SUM(cost_usd) as total_cost FROM `${project}.job_control.finops_usage` WHERE DATE(usage_ts) >= DATE_TRUNC(CURRENT_DATE(), MONTH) AND environment = '${environment}'",
              "refId": "A",
              "format": "table"
            }
          ],
          "title": "Total Monthly Spend (MTD)",
          "type": "stat"
        },
        {
          "datasource": "${DS_BIGQUERY}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 1 },
          "id": 2,
          "options": {
            "colorMode": "background",
            "graphMode": "area",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_BIGQUERY}",
              "rawQuery": true,
              "rawSql": "SELECT SUM(cost_usd) as daily_cost FROM `${project}.job_control.finops_usage` WHERE DATE(usage_ts) = CURRENT_DATE() AND environment = '${environment}'",
              "refId": "A",
              "format": "table"
            }
          ],
          "title": "Today's Spend",
          "type": "stat"
        },
        {
          "datasource": "${DS_BIGQUERY}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 1 },
          "id": 3,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "auto",
            "orientation": "auto",
            "reduceOptions": {
              "calcs": ["lastNotNull"],
              "fields": "",
              "values": false
            },
            "textMode": "auto"
          },
          "targets": [
            {
              "datasource": "${DS_BIGQUERY}",
              "rawQuery": true,
              "rawSql": "SELECT SUM(cost_usd) / NULLIF(COUNT(DISTINCT run_id), 0) as cost_per_run FROM `${project}.job_control.finops_usage` WHERE DATE(usage_ts) >= DATE_SUB(CURRENT_DATE(), INTERVAL 7 DAY) AND environment = '${environment}'",
              "refId": "A",
              "format": "table"
            }
          ],
          "title": "Avg Cost per Run (7d)",
          "type": "stat"
        },
        {
          "datasource": "${DS_BIGQUERY}",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "green", "value": null }]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 1 },
          "id": 4,
          "options": {
            "colorMode": "background",
            "graphMode": "none",
