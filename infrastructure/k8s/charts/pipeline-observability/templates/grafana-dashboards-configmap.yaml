              "rawSql": "SELECT entity, AVG(CASE grade WHEN 'A' THEN 4 WHEN 'B' THEN 3 WHEN 'C' THEN 2 WHEN 'D' THEN 1 ELSE 0 END) as avg_grade_score FROM `${project}.job_control.data_quality_runs` WHERE DATE(run_ts) >= DATE_SUB(CURRENT_DATE(), INTERVAL 30 DAY) AND environment = '${environment}' AND entity LIKE '%${entity}%' GROUP BY entity ORDER BY avg_grade_score DESC",
              "refId": "A",
              "format": "table"
            }
          ],
          "title": "Per-Entity Average Grade Score (0=F, 4=A, last 30d)",
          "type": "barchart"
        }
      ],
      "refresh": "5m",
      "schemaVersion": 38,
      "tags": ["pipeline", "quality", "grades"],
      "templating": {
        "list": [
          {
            "name": "DS_BIGQUERY",
            "type": "datasource",
            "pluginId": "grafana-bigquery-datasource",
            "label": "BigQuery",
            "hide": 0,
            "current": {}
          },
          {
            "name": "system_id",
            "type": "constant",
            "label": "System ID",
            "query": "default",
            "current": { "value": "default", "text": "default" },
            "hide": 0
          },
          {
            "name": "environment",
            "type": "custom",
            "label": "Environment",
            "query": "dev,staging,prod",
            "current": { "value": "prod", "text": "prod" },
            "hide": 0
          },
          {
            "name": "entity",
            "type": "custom",
            "label": "Entity",
            "query": "All",
            "current": { "value": "$__all", "text": "All" },
            "includeAll": true,
            "multi": true,
            "hide": 0
          },
          {
            "name": "project",
