{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipeline-observability.fullname" . }}-otel-collector
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pipeline-observability.labels" . | nindent 4 }}
    app: otel-collector
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 4317
    targetPort: 4317
    protocol: TCP
  - name: http
    port: 4318
    targetPort: 4318
    protocol: TCP
  selector:
    {{- include "pipeline-observability.selectorLabels" . | nindent 4 }}
    app: otel-collector
---
{{- end }}
{{- if .Values.grafana.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pipeline-observability.fullname" . }}-grafana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "pipeline-observability.labels" . | nindent 4 }}
    app: grafana
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3000
    targetPort: 3000
    protocol: TCP
  selector:
    {{- include "pipeline-observability.selectorLabels" . | nindent 4 }}
    app: grafana
{{- end }}
