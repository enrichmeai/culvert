version: "3.8"

x-airflow-common: &airflow-common
  image: apache/airflow:2.10.0-python3.11
  environment:
    &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__CORE__PARALLELISM: "32"
    AIRFLOW__CORE__DAG_CONCURRENCY: "16"
    AIRFLOW__WEBSERVER__SECRET_KEY: "local-dev-not-for-prod"
    # Point pipeline clients at emulators
    STORAGE_EMULATOR_HOST: "http://gcs-fake:4443"
    PUBSUB_EMULATOR_HOST: "pubsub-fake:8085"
    BIGQUERY_EMULATOR_HOST: "http://bq-fake:9050"
    # Pipeline environment identifiers
    GCP_PROJECT_ID: "local"
    ENVIRONMENT: "local"
  volumes:
    - ../../deployments/data-pipeline-orchestrator/dags:/opt/airflow/dags:ro
    - ./plugins:/opt/airflow/plugins:ro
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username admin --password admin \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com || true
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: ["webserver"]
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      retries: 8

  airflow-scheduler:
    <<: *airflow-common
    command: ["scheduler"]
    depends_on:
      - airflow-init

  gcs-fake:
    image: fsouza/fake-gcs-server:latest
    command: ["-scheme", "http", "-port", "4443", "-public-host", "gcs-fake:4443"]
    ports:
      - "4443:4443"

  pubsub-fake:
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:latest
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"

  bq-fake:
    image: ghcr.io/goccy/bigquery-emulator:latest
    command: ["--project=local", "--port=9050", "--log-level=info"]
    ports:
      - "9050:9050"

volumes:
  postgres-data:
