# Pre-commit hooks. Install with: pip install pre-commit && pre-commit install
# Run manually against all files with: pre-commit run --all-files
#
# Config is aligned with the CI lint job in .github/workflows/ci.yml and the
# black/isort settings used across data-pipeline-libraries/.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'   # markdown trailing whitespace is sometimes intentional (line breaks)
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: '^\.github/workflows/.*\.yml$'   # GH Actions !input tags confuse the parser
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black
        language_version: python3.11
        args: ['--line-length=100']

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=100']

  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        # Match CI: block on real errors, leave complexity/line-length to local signal.
        # The full strict pass is wired via .flake8 at repo root.
        additional_dependencies: []
