# =============================================================================
# Savings Segment Template
# =============================================================================
# CDP table: savings_accounts
# Output: Fixed-width 200-char records for mainframe savings segment
# =============================================================================
segment_id: savings
segment_name: Savings
description: "Savings account segment for mainframe"
record_length: 200

# 1. CDP source table
source:
  dataset: cdp_generic
  table: savings_accounts
  partition_column: updated_at

# 2. SQL query Dataflow executes
#    Placeholders: {project}, {period_start}, {period_end}
query: |
  SELECT
    customer_id,
    account_id,
    account_type,
    current_balance,
    interest_rate,
    interest_accrued,
    last_deposit_date,
    withdrawal_count,
    account_status
  FROM `{project}.cdp_generic.savings_accounts`
  WHERE account_status != 'CLOSED'
    AND updated_at BETWEEN '{period_start}' AND '{period_end}'

# 3. Output template — fixed-width mainframe file layout
output:
  file_prefix: "SVGS"
  file_suffix: ".dat"
  shard_template: "-SSSSS-of-NNNNN"
  max_records_per_shard: 1000000

  fields:
    - name: segment_type
      source: _literal
      literal_value: "SVGS"
      width: 4
      type: string
      align: left
      pad_char: " "

    - name: customer_id
      source: customer_id
      width: 20
      type: string
      align: left
      pad_char: " "

    - name: account_id
      source: account_id
      width: 20
      type: string
      align: left
      pad_char: " "

    - name: account_type
      source: account_type
      width: 10
      type: string
      align: left
      pad_char: " "

    - name: current_balance
      source: current_balance
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: interest_rate
      source: interest_rate
      width: 8
      type: rate
      decimal_places: 4
      align: right
      pad_char: " "

    - name: interest_accrued
      source: interest_accrued
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: last_deposit_date
      source: last_deposit_date
      width: 8
      type: date
      date_format: "%Y%m%d"
      null_value: "00000000"

    - name: withdrawal_count
      source: withdrawal_count
      width: 6
      type: integer
      align: right
      pad_char: "0"

    - name: account_status
      source: account_status
      width: 1
      type: string
      align: left
      pad_char: " "

    - name: extract_date
      source: _extract_date
      width: 8
      type: date
      date_format: "%Y%m%d"
      null_value: "00000000"

    - name: filler
      source: _literal
      literal_value: ""
      width: 85
      type: filler
      pad_char: " "
