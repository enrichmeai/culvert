# =============================================================================
# Credit Card Segment Template
# =============================================================================
# CDP table: credit_card_accounts
# Output: Fixed-width 200-char records for mainframe credit card segment
# =============================================================================
segment_id: credit_card
segment_name: CreditCard
description: "Credit card account segment for mainframe"
record_length: 200

# 1. CDP source table
source:
  dataset: cdp_generic
  table: credit_card_accounts
  partition_column: updated_at

# 2. SQL query Dataflow executes
#    Placeholders: {project}, {period_start}, {period_end}
query: |
  SELECT
    customer_id,
    account_id,
    card_number,
    credit_limit,
    current_balance,
    available_credit,
    interest_rate,
    minimum_payment,
    payment_due_date,
    account_status
  FROM `{project}.cdp_generic.credit_card_accounts`
  WHERE account_status != 'CLOSED'
    AND updated_at BETWEEN '{period_start}' AND '{period_end}'

# 3. Output template — fixed-width mainframe file layout
output:
  file_prefix: "CCRD"
  file_suffix: ".dat"
  shard_template: "-SSSSS-of-NNNNN"
  max_records_per_shard: 1000000

  fields:
    - name: segment_type
      source: _literal
      literal_value: "CCRD"
      width: 4
      type: string
      align: left
      pad_char: " "

    - name: customer_id
      source: customer_id
      width: 20
      type: string
      align: left
      pad_char: " "

    - name: account_id
      source: account_id
      width: 20
      type: string
      align: left
      pad_char: " "

    - name: card_number
      source: card_number
      width: 16
      type: string
      align: left
      pad_char: " "

    - name: credit_limit
      source: credit_limit
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: current_balance
      source: current_balance
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: available_credit
      source: available_credit
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: interest_rate
      source: interest_rate
      width: 8
      type: rate
      decimal_places: 4
      align: right
      pad_char: " "

    - name: minimum_payment
      source: minimum_payment
      width: 15
      type: amount
      decimal_places: 2
      align: right
      pad_char: " "

    - name: payment_due_date
      source: payment_due_date
      width: 8
      type: date
      date_format: "%Y%m%d"
      null_value: "00000000"

    - name: account_status
      source: account_status
      width: 1
      type: string
      align: left
      pad_char: " "

    - name: extract_date
      source: _extract_date
      width: 8
      type: date
      date_format: "%Y%m%d"
      null_value: "00000000"

    - name: filler
      source: _literal
      literal_value: ""
      width: 55
      type: filler
      pad_char: " "
