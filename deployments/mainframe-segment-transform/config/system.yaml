# =============================================================================
# Mainframe Segment Transform — System Configuration
# =============================================================================
# Each segment has a YAML template in config/templates/ defining:
#   1. CDP source table + SQL query for Dataflow to execute
#   2. Fixed-width output template (fields, widths, formatting)
#
# To add a new segment: create a template YAML and register it below.
# =============================================================================
system_id: GENERIC
system_name: Generic
pipeline_name: mainframe-segment-transform

# Registered segments — each must have a matching template in config/templates/
segments:
  - customer
  # Future segments (uncomment when ready):
  # - credit_card
  # - check_debit_card
  # - loans
  # - savings

# Default source dataset (can be overridden per-segment in template)
default_cdp_dataset: cdp_generic

# Output configuration
output:
  bucket_template: "{project_id}-generic-{env}-segments"
  path_template: "segments/{period}/{run_id}/{segment_id}/{file_prefix}"

# Infrastructure
infrastructure:
  datasets:
    cdp: "cdp_generic"
    job_control: "job_control"
  buckets:
    output: "{project_id}-generic-{env}-segments"
    temp: "{project_id}-generic-{env}-temp"
  pubsub:
    audit_topic: "generic-pipeline-events"
