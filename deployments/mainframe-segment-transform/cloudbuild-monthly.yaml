# =============================================================================
# Monthly Segment Extract Pipeline
# =============================================================================
# Triggered by the CDP refresh pipeline (cdp-monthly-refresh) on success.
# Can also be triggered manually to re-run segment without re-running dbt.
#
# Steps:
#   1. Check CDP readiness — verify last month's partition exists (sensor)
#   2. Launch Dataflow segment-transform (async — job runs independently)
#
# Manual retry after CDP is already built:
#   gcloud builds triggers run monthly-segment-transform \
#     --project=$PROJECT_ID --branch=main \
#     --substitutions=_EXTRACT_MONTH=202603
#
# Substitutions:
#   _OUTPUT_BUCKET   GCS bucket for segment output files (required)
#   _SEGMENT         Segment to process (default: customer)
#   _EXTRACT_MONTH   YYYYMM override — empty = auto-derive last month
#   _REGION          GCP region for Dataflow (default: europe-west2)
# =============================================================================

steps:

  # ---------------------------------------------------------------------------
  # Step 1: CDP readiness check (replaces Airflow BigQuery sensor)
  # Verifies the CDP snapshot for last month exists before launching Dataflow.
  # This is the safety net — segment never runs against missing/stale data.
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'check-cdp-ready'
    entrypoint: bash
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        if [ -n "${_EXTRACT_MONTH}" ]; then
          EXTRACT_MONTH="${_EXTRACT_MONTH}"
        else
          EXTRACT_MONTH=$(date -d "$(date +%Y-%m-01) -1 day" +%Y%m)
        fi

        YEAR="${EXTRACT_MONTH:0:4}"
        MONTH_NUM="${EXTRACT_MONTH:4:2}"
        LAST_DAY=$(date -d "${YEAR}-${MONTH_NUM}-01 +1 month -1 day" +%Y-%m-%d)

        echo "Checking CDP readiness: ${PROJECT_ID}.cdp_generic.customer_risk_profile"
        echo "Partition: ${LAST_DAY}"

        ROW_COUNT=$(bq --project_id="${PROJECT_ID}" query \
          --nouse_legacy_sql --format=csv --quiet \
          "SELECT COUNT(*) FROM \`${PROJECT_ID}.cdp_generic.customer_risk_profile\`
           WHERE _extract_date = '${LAST_DAY}'
             AND customer_status IN ('ACTIVE', 'DORMANT')" \
          2>/dev/null | tail -1 | tr -d ' \r')

        if [ -z "${ROW_COUNT}" ] || [ "${ROW_COUNT}" = "0" ]; then
          echo ""
          echo "ERROR: CDP partition ${LAST_DAY} is empty or missing."
          echo "Run the CDP refresh first:"
          echo "  gcloud builds triggers run cdp-monthly-refresh \\"
          echo "    --project=${PROJECT_ID} --branch=main \\"
          echo "    --substitutions=_EXTRACT_MONTH=${EXTRACT_MONTH}"
          exit 1
        fi

        echo "CDP ready: ${ROW_COUNT} eligible records for ${LAST_DAY}"

        # Write resolved values for Dataflow step
        echo "${EXTRACT_MONTH}"   > /workspace/extract_month.txt
        echo "${LAST_DAY//-/}"    > /workspace/extract_date.txt

  # ---------------------------------------------------------------------------
  # Step 2: Launch Dataflow segment-transform (async)
  # Dataflow job runs independently — this build exits after launch.
  # ---------------------------------------------------------------------------
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    id: 'launch-dataflow'
    entrypoint: bash
    args:
      - '-euo'
      - 'pipefail'
      - '-c'
      - |
        EXTRACT_MONTH=$(cat /workspace/extract_month.txt)
        EXTRACT_DATE=$(cat /workspace/extract_date.txt)
        RUN_ID="seg-monthly-${EXTRACT_MONTH}-${BUILD_ID:0:8}"

        echo "Launching segment-transform:"
        echo "  segment       = ${_SEGMENT}"
        echo "  extract_month = ${EXTRACT_MONTH}"
        echo "  extract_date  = ${EXTRACT_DATE}"
        echo "  run_id        = ${RUN_ID}"
        echo "  output_bucket = ${_OUTPUT_BUCKET}"

        gcloud dataflow flex-template run "segment-${_SEGMENT}-${EXTRACT_MONTH}" \
          --project="${PROJECT_ID}" \
          --region="${_REGION}" \
          --template-file-gcs-location="gs://${_OUTPUT_BUCKET}/templates/segment_transform.json" \
          --parameters segment="${_SEGMENT}" \
          --parameters extract_date="${EXTRACT_DATE}" \
          --parameters extract_month="${EXTRACT_MONTH}" \
          --parameters output_bucket="${_OUTPUT_BUCKET}" \
          --parameters run_id="${RUN_ID}" \
          --parameters gcp_project="${PROJECT_ID}"

        echo ""
        echo "Dataflow job launched: segment-${_SEGMENT}-${EXTRACT_MONTH}"
        echo "Monitor: https://console.cloud.google.com/dataflow/jobs?project=${PROJECT_ID}"
        echo ""
        echo "Output: gs://${_OUTPUT_BUCKET}/segments/${EXTRACT_MONTH}/${RUN_ID}/${_SEGMENT}/"
    waitFor: ['check-cdp-ready']

substitutions:
  _OUTPUT_BUCKET: ''              # set by Terraform (required)
  _SEGMENT:       'customer'
  _EXTRACT_MONTH: ''              # empty = auto-derive last calendar month
  _REGION:        'europe-west2'

options:
  logging: CLOUD_LOGGING_ONLY
