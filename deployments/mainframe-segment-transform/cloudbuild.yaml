steps:
# Step 1: Build the Dataflow Flex Template Docker image
- name: 'gcr.io/cloud-builders/docker'
  id: 'build-image'
  args:
  - build
  - --build-arg
  - LIBRARY_VERSION=$_LIBRARY_VERSION
  - --tag
  - gcr.io/$PROJECT_ID/generic-segment-transform:$_LIBRARY_VERSION
  - --tag
  - gcr.io/$PROJECT_ID/generic-segment-transform:latest
  - -f
  - deployments/mainframe-segment-transform/Dockerfile
  - .

# Step 2: Push the Docker image to GCR
- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image'
  args:
  - push
  - gcr.io/$PROJECT_ID/generic-segment-transform:$_LIBRARY_VERSION
  waitFor: ['build-image']

- name: 'gcr.io/cloud-builders/docker'
  id: 'push-image-latest'
  args:
  - push
  - gcr.io/$PROJECT_ID/generic-segment-transform:latest
  waitFor: ['build-image']

# Step 3: Create the Dataflow Flex Template spec and upload to GCS
- name: 'gcr.io/cloud-builders/gcloud'
  id: 'create-flex-template'
  entrypoint: 'bash'
  args:
  - '-c'
  - |
    # Create the Flex Template spec JSON
    cat > /tmp/segment_transform.json <<EOF
    {
      "image": "gcr.io/$PROJECT_ID/generic-segment-transform:$_LIBRARY_VERSION",
      "sdkInfo": {
        "language": "PYTHON"
      },
      "metadata": {
        "name": "mainframe-segment-transform",
        "description": "CDP BigQuery to fixed-width mainframe segment files (template-driven)",
        "parameters": [
          {
            "name": "segment",
            "label": "Segment ID",
            "helpText": "Segment to process (currently: customer only)",
            "isOptional": false
          },
          {
            "name": "extract_date",
            "label": "Extract Date",
            "helpText": "Extract date in YYYYMMDD format",
            "isOptional": false
          },
          {
            "name": "extract_month",
            "label": "Extract Month",
            "helpText": "Extract month in YYYYMM format (defaults to month of extract_date)",
            "isOptional": true
          },
          {
            "name": "output_bucket",
            "label": "Output GCS Bucket",
            "helpText": "GCS bucket for segment output files",
            "isOptional": false
          },
          {
            "name": "run_id",
            "label": "Run ID",
            "helpText": "Unique run identifier for job tracking",
            "isOptional": true
          },
          {
            "name": "gcp_project",
            "label": "GCP Project ID",
            "helpText": "GCP project ID for BigQuery and job control",
            "isOptional": true
          }
        ]
      }
    }
    EOF

    # Upload the template spec to GCS
    gsutil cp /tmp/segment_transform.json gs://$PROJECT_ID-generic-int-temp/templates/segment_transform.json

    echo "Flex Template uploaded to gs://$PROJECT_ID-generic-int-temp/templates/segment_transform.json"
  waitFor: ['push-image']

images:
- gcr.io/$PROJECT_ID/generic-segment-transform:$_LIBRARY_VERSION
- gcr.io/$PROJECT_ID/generic-segment-transform:latest

substitutions:
  _LIBRARY_VERSION: latest

options:
  logging: CLOUD_LOGGING_ONLY
