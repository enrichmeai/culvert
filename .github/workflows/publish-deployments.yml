name: Publish Deployments to PyPI

# =============================================================================
# Publishes reference deployments to PyPI when a tag is pushed.
# Mirrors publish-libraries.yml but for the deployments/ directory.
#
# Trigger Modes:
#   1. Tags: v* tags automatically publish to PyPI
#   2. Push to main: dry-run build only
#   3. Release: GitHub release published
#   4. Manual: workflow_dispatch with options
# =============================================================================

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      repository:
        description: 'PyPI repository to publish to'
        required: true
        default: 'testpypi'
        type: choice
        options:
          - pypi
          - testpypi
      deployment:
        description: 'Deployment to publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - original-data-to-bigqueryload
          - bigquery-to-mapped-product
          - data-pipeline-orchestrator
          - fdp-to-consumable-product
          - mainframe-segment-transform
          - spanner-to-bigquery-load
          - postgres-cdc-streaming
          - fdp-trigger

concurrency:
  group: publish-deployments-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================================================
  # Detect which deployments changed
  # ==========================================================================
  detect-changes:
    name: Detect Changed Deployments
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      should_publish: ${{ steps.check.outputs.should_publish }}
      target_repo: ${{ steps.check.outputs.target_repo }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine publish conditions
        id: check
        run: |
          SHOULD_PUBLISH="false"
          TARGET_REPO="testpypi"

          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"

          # Tag push (v*) - always publish to PyPI
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "Tag push detected - publishing to PyPI"
            SHOULD_PUBLISH="true"
            TARGET_REPO="pypi"
          fi

          # Release event
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "Release event - publishing to PyPI"
            SHOULD_PUBLISH="true"
            TARGET_REPO="pypi"
          fi

          # Manual dispatch
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual dispatch"
            SHOULD_PUBLISH="true"
            TARGET_REPO="${{ inputs.repository }}"
          fi

          echo "should_publish=$SHOULD_PUBLISH" >> $GITHUB_OUTPUT
          echo "target_repo=$TARGET_REPO" >> $GITHUB_OUTPUT

      - name: Set deployment matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DEPLOYMENT="${{ inputs.deployment }}"
          else
            DEPLOYMENT="all"
          fi

          if [ "$DEPLOYMENT" == "all" ]; then
            MATRIX='{"deployment":["original-data-to-bigqueryload","bigquery-to-mapped-product","data-pipeline-orchestrator","fdp-to-consumable-product","mainframe-segment-transform","spanner-to-bigquery-load","postgres-cdc-streaming","fdp-trigger"]}'
          else
            MATRIX="{\"deployment\":[\"$DEPLOYMENT\"]}"
          fi

          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Deployment matrix: $MATRIX"

  # ==========================================================================
  # Test Deployments
  # ==========================================================================
  test:
    name: Test ${{ matrix.deployment }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.should_publish == 'true'
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: deployments/${{ matrix.deployment }}/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          cd deployments/${{ matrix.deployment }}
          if [ -f pyproject.toml ]; then
            pip install ".[dev]" || pip install .
          fi
          pip install pytest pytest-cov pytest-mock

      - name: Run tests
        run: |
          cd deployments/${{ matrix.deployment }}
          if [ -d tests ]; then
            pytest tests/unit -v \
              --tb=short \
              --cov=src \
              --cov-report=term-missing \
              || exit 1
          else
            echo "No tests found for ${{ matrix.deployment }}"
          fi

  # ==========================================================================
  # Publish Deployments
  # ==========================================================================
  publish:
    name: Publish ${{ matrix.deployment }}
    needs: [detect-changes, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Extract version
        id: version
        run: |
          cd deployments/${{ matrix.deployment }}
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Package version: $VERSION"

      - name: Build package
        run: |
          cd deployments/${{ matrix.deployment }}
          python -m build

          echo "Built packages:"
          ls -la dist/

          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.deployment }}
          path: deployments/${{ matrix.deployment }}/dist/
          retention-days: 30

      - name: Publish to PyPI (Trusted Publishing)
        if: needs.detect-changes.outputs.should_publish == 'true'
        env:
          TWINE_NON_INTERACTIVE: 'true'
        run: |
          cd deployments/${{ matrix.deployment }}
          TARGET="${{ needs.detect-changes.outputs.target_repo }}"

          echo "Publishing ${{ matrix.deployment }} v${{ steps.version.outputs.version }} to $TARGET..."

          if [ "$TARGET" == "pypi" ]; then
            python -m twine upload dist/* --skip-existing
          else
            python -m twine upload --repository testpypi dist/* --skip-existing
          fi

          echo "Successfully published ${{ matrix.deployment }} to $TARGET"

      - name: Post publish summary
        run: |
          echo "## Published: ${{ matrix.deployment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Package | ${{ matrix.deployment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Version | ${{ steps.version.outputs.version }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Repository | ${{ needs.detect-changes.outputs.target_repo }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Published |" >> $GITHUB_STEP_SUMMARY

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Publish Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, publish]
    if: always() && needs.detect-changes.outputs.should_publish == 'true'

    steps:
      - name: Generate Summary
        run: |
          echo "# Deployments Publish Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ needs.detect-changes.outputs.target_repo }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Publish Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Deployment | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Publish | ${{ needs.publish.result == 'success' && '✅ Success' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
