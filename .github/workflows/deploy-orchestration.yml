name: Deploy Orchestration

# =============================================================================
# Deploys just the orchestration unit on its own cadence.
# Triggered only when the orchestration deployment or its DAGs change.
# =============================================================================

on:
  push:
    branches: [main]
    paths:
      - 'deployments/data-pipeline-orchestrator/**'
      - 'gcp-pipeline-libraries/data-pipeline-orchestration/**'
      - 'infrastructure/terraform/systems/generic/orchestration/**'
      - '.github/workflows/deploy-orchestration.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-orchestration-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  GCP_REGION: 'europe-west2'

permissions:
  contents: read
  id-token: write

jobs:
  # ==========================================================================
  # Detect what changed
  # ==========================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    # Gate: push triggers only run when commit message contains [deploy]
    # or [publish:deploy]. workflow_dispatch always runs.
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.head_commit.message, '[deploy]') ||
      contains(github.event.head_commit.message, '[publish:deploy]')
    outputs:
      dags_changed: ${{ steps.changes.outputs.dags_changed }}
      libs_changed: ${{ steps.changes.outputs.libs_changed }}
      terraform_changed: ${{ steps.changes.outputs.terraform_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed paths
        id: changes
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "dags_changed=true" >> $GITHUB_OUTPUT
            echo "libs_changed=true" >> $GITHUB_OUTPUT
            echo "terraform_changed=true" >> $GITHUB_OUTPUT
            echo "Manual trigger — all components enabled"
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
            echo "Changed files:"
            echo "$CHANGED"

            echo "dags_changed=$(echo "$CHANGED" | grep -q '^deployments/data-pipeline-orchestrator/dags/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "libs_changed=$(echo "$CHANGED" | grep -q '^gcp-pipeline-libraries/data-pipeline-orchestration/' && echo true || echo false)" >> $GITHUB_OUTPUT
            echo "terraform_changed=$(echo "$CHANGED" | grep -q '^infrastructure/terraform/systems/generic/orchestration/' && echo true || echo false)" >> $GITHUB_OUTPUT
          fi

  # ==========================================================================
  # Test orchestration library and DAGs
  # ==========================================================================
  test:
    name: Test Orchestration
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            gcp-pipeline-libraries/data-pipeline-orchestration/pyproject.toml
            deployments/data-pipeline-orchestrator/pyproject.toml

      - name: Install orchestration library
        run: |
          python -m pip install --upgrade pip setuptools wheel
          cd gcp-pipeline-libraries/data-pipeline-orchestration
          pip install ".[dev]" || pip install .

      - name: Run library tests
        run: |
          cd gcp-pipeline-libraries/data-pipeline-orchestration
          if [ -d tests ]; then
            pip install pytest pytest-cov pytest-mock
            pytest tests/unit -v --tb=short
          fi

      - name: Validate DAG syntax
        run: |
          cd deployments/data-pipeline-orchestrator
          if [ -d dags ]; then
            for f in dags/*.py; do python3 -m py_compile "$f"; done
            echo "All DAG files compiled successfully"
          fi

  # ==========================================================================
  # Apply Terraform for orchestration infrastructure
  # ==========================================================================
  apply-terraform:
    name: Apply Terraform (Orchestration)
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.terraform_changed == 'true'
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: pipeline-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
        run: |
          cd infrastructure/terraform/systems/generic/orchestration
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          terraform init \
            -backend-config="bucket=gcp-pipeline-terraform-state" \
            -backend-config="prefix=orchestration/${ENV}"

      - name: Terraform Plan
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
        run: |
          cd infrastructure/terraform/systems/generic/orchestration
          terraform plan -out=tfplan

      - name: Terraform Apply
        env:
          TF_VAR_gcp_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_environment: ${{ github.event.inputs.environment || 'dev' }}
          TF_VAR_gcp_region: ${{ env.GCP_REGION }}
        run: |
          cd infrastructure/terraform/systems/generic/orchestration
          terraform apply -auto-approve tfplan

  # ==========================================================================
  # Sync DAGs to Composer
  # ==========================================================================
  sync-dags:
    name: Sync DAGs to Composer
    runs-on: ubuntu-latest
    needs: [detect-changes, test, apply-terraform]
    if: needs.detect-changes.outputs.dags_changed == 'true' || always()
    timeout-minutes: 30
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: pipeline-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload DAGs to Composer
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          COMPOSER_ENV="generic-${ENV}-composer"
          REGION="${{ env.GCP_REGION }}"

          echo "Syncing DAGs to Composer environment: $COMPOSER_ENV"

          # Get the DAG bucket from Composer
          DAGS_BUCKET=$(gcloud composer environments describe $COMPOSER_ENV \
            --location=$REGION \
            --project=$PROJECT_ID \
            --format='value(config.dagGcsPrefix)' 2>/dev/null) || true

          if [ -n "$DAGS_BUCKET" ]; then
            echo "DAG bucket: $DAGS_BUCKET"

            # Clean stale library code
            gsutil -m rm -rf ${DAGS_BUCKET}/gcp_pipeline_core 2>/dev/null || true
            gsutil -m rm -rf ${DAGS_BUCKET}/data_pipeline_orchestration 2>/dev/null || true

            # Sync DAG files
            gsutil -m rsync -r -d deployments/data-pipeline-orchestrator/dags/ ${DAGS_BUCKET}/generic/

            echo "DAGs synced successfully"
          else
            echo "ERROR: Could not retrieve Composer DAG bucket"
            exit 1
          fi

  # ==========================================================================
  # Smoke test
  # ==========================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [detect-changes, test, sync-dags]
    if: always() && needs.sync-dags.result == 'success'
    timeout-minutes: 45
    environment: ${{ github.event.inputs.environment || 'dev' }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: pipeline-deployer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Run smoke test
        run: |
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          ENV="${{ github.event.inputs.environment || 'dev' }}"
          COMPOSER_ENV="generic-${ENV}-composer"
          REGION="${{ env.GCP_REGION }}"

          echo "Running smoke test on $COMPOSER_ENV"

          gcloud composer environments run $COMPOSER_ENV \
            --location=$REGION \
            dags list -- \
            | head -5 || echo "Composer environment not ready yet"

          echo "Smoke test completed"

  # ==========================================================================
  # Summary
  # ==========================================================================
  summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, test, apply-terraform, sync-dags, smoke-test]
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "# Orchestration Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Changed | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| DAGs | ${{ needs.detect-changes.outputs.dags_changed }} | ${{ needs.sync-dags.result == 'success' && '✅' || needs.sync-dags.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Library | ${{ needs.detect-changes.outputs.libs_changed }} | ${{ needs.test.result == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Terraform | ${{ needs.detect-changes.outputs.terraform_changed }} | ${{ needs.apply-terraform.result == 'success' && '✅' || needs.apply-terraform.result == 'skipped' && '⏭️' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ needs.smoke-test.result == 'success' && '✅ Passed' || needs.smoke-test.result == 'skipped' && '⏭️ Skipped' || '❌ Failed' }}" >> $GITHUB_STEP_SUMMARY
