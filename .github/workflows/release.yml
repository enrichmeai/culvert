name: Release

# =============================================================================
# Drafts release notes and creates GitHub releases.
# Triggered when tags are pushed or manually via workflow_dispatch.
# =============================================================================

on:
  pull_request:
    types: [closed]
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  # ==========================================================================
  # Draft release notes based on PR labels
  # ==========================================================================
  draft-release-notes:
    name: Draft Release Notes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release-drafter
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter.yml
        env:
          GITHUB_TOKEN: ${{ github.token }}

  # ==========================================================================
  # Publish GitHub Release on tag push
  # ==========================================================================
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref }}"
          VERSION="${TAG#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build distribution packages
        run: |
          python -m pip install --upgrade pip build
          
          # Build all libraries
          mkdir -p dist/
          for lib in gcp-pipeline-core gcp-pipeline-beam gcp-pipeline-orchestration gcp-pipeline-transform gcp-pipeline-tester gcp-pipeline-framework; do
            if [ -d "gcp-pipeline-libraries/$lib" ]; then
              echo "Building $lib..."
              python -m build ./gcp-pipeline-libraries/$lib --outdir dist/ --wheel
            fi
          done
          
          # Build deployments
          for deploy in original-data-to-bigqueryload bigquery-to-mapped-product data-pipeline-orchestrator fdp-to-consumable-product mainframe-segment-transform spanner-to-bigquery-load postgres-cdc-streaming fdp-trigger; do
            if [ -d "deployments/$deploy" ]; then
              echo "Building $deploy..."
              python -m build ./deployments/$deploy --outdir dist/ --wheel
            fi
          done
          
          echo "Built wheels:"
          ls -la dist/

      - name: Create GitHub Release with Release Drafter
        id: create_release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          
          echo "Creating release $TAG..."
          
          # Get the draft release if it exists
          DRAFT_RELEASE=$(gh release list --draft --json name,tagName,body --query ".[] | select(.tagName==\"$TAG\")" -H "Accept: application/vnd.github.v3+json")
          
          if [ -n "$DRAFT_RELEASE" ]; then
            echo "Publishing existing draft release..."
            gh release edit $TAG --draft=false -H "Accept: application/vnd.github.v3+json"
          else
            echo "Creating new release from scratch..."
            gh release create $TAG \
              --title "Release $TAG" \
              --generate-notes \
              --draft=false
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload wheel artifacts to release
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          
          echo "Uploading wheels to release $TAG..."
          
          if [ -f dist/*.whl ]; then
            gh release upload $TAG dist/*.whl --clobber
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Post Release Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/$TAG"
          
          echo "## Release Published: $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Version | $VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | [$RELEASE_URL]($RELEASE_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
