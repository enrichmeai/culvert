name: Build Segment Transform

# =============================================================================
# Builds the Dataflow Flex Template ONLY (Docker image + template spec).
# Infrastructure is managed by Terraform — not this workflow.
#
# Flow:
#   1. terraform apply  (local — creates BQ tables + GCS bucket)
#   2. This workflow     (GitHub Actions — builds Dataflow image only)
#   3. E2E test          (local — launches Dataflow job + generates report)
#   4. terraform destroy (local — tears down)
#
# Trigger: manual only (workflow_dispatch) to save Actions minutes.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      library_version:
        description: 'Library version (default: 1.0.29)'
        required: false
        default: '1.0.29'
        type: string

env:
  LIBRARY_VERSION: ${{ github.event.inputs.library_version || '1.0.29' }}

permissions:
  contents: read

jobs:
  test:
    name: Test mainframe-segment-transform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-mock pytest-cov
          # Libraries (core first — required by transitive deps)
          pip install -e gcp-pipeline-libraries/gcp-pipeline-core
          pip install -e gcp-pipeline-libraries/gcp-pipeline-beam
          pip install -e gcp-pipeline-libraries/data-pipeline-tester
          # Deployment package
          pip install -e deployments/mainframe-segment-transform

      - name: Run tests
        run: |
          pytest deployments/mainframe-segment-transform/tests -v --tb=short

  build-flex-template:
    name: Build Dataflow Flex Template
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build & push via Cloud Build
        run: |
          gcloud builds submit \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --config=deployments/mainframe-segment-transform/cloudbuild.yaml \
            --substitutions="_LIBRARY_VERSION=${{ env.LIBRARY_VERSION }}" \
            .
        timeout-minutes: 20

      - name: Summary
        run: |
          echo "Image:    gcr.io/${{ secrets.GCP_PROJECT_ID }}/generic-segment-transform:${{ env.LIBRARY_VERSION }}"
          echo "Template: gs://${{ secrets.GCP_PROJECT_ID }}-generic-int-segments/templates/segment_transform.json"
