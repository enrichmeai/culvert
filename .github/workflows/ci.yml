# ============================================================================
# Culvert CI — Sprint-15 rewrite (T15.1 / #77), extended by T15.2 (#79)
#
# Replaces the legacy gcp-pipeline-libraries Python-only CI with a polyglot
# workflow that covers:
#   1. Java reactor  — 13 modules under data-pipeline-libraries-java/
#   2. Python (Culvert adapters) — 3 GCP adapter modules under
#      data-pipeline-libraries/  (bigquery, gcs, pubsub)
#   3. [T15.2] Java emulator ITs — `mvn -P it verify` against Testcontainers
#      emulators (BigQuery goccy, GCS fake-gcs-server, Pub/Sub emulator).
#
# NOTE — workflow is intentionally NOT enabled at the GitHub level.
# Re-enabling (gh workflow enable / UI toggle) is an ENGINEER trigger once
# the team is ready to resume Actions minutes. See CLAUDE.md deploy rules.
#
# NOTE — `mvn --batch-mode` (online) vs `mvn -o` (offline)
# The issue (#77) spec said `-o` but CI runners start with an empty ~/.m2
# cache. Running offline on a cold runner would fail immediately because no
# artifacts exist. We use online Maven with a cached ~/.m2 so the first run
# populates the cache and subsequent runs are fast.  The observability module
# specifically imports google-cloud-monitoring via libraries-bom 26.39.0 which
# is a network-only fetch — another hard blocker for `-o` on CI runners.
# The same rationale applies to the IT job: failsafe + testcontainers + the
# emulator client libs are all network-only fetches on a cold runner.
#
# NOTE — Python module scope and #88
# Only data-pipeline-gcp-bigquery, data-pipeline-gcp-gcs, and
# data-pipeline-gcp-pubsub are included (matching the DoD checklist from #77).
# data-pipeline-orchestration is EXCLUDED pending tech-debt #88: the file
# tests/unit/test_create_dags.py references the Airflow-3.x-only import path
# `airflow.providers.standard.operators.empty` which does not exist under
# the pinned Airflow 2.9.x.  That file already contains a module-level
# `pytest.skip()` as a temporary guard, but the module still cannot be
# collected cleanly on a clean CI runner without Airflow installed.
# Fix tracked in #88.
#
# NOTE — Required Actions secrets / permissions (T15.2 — emulator IT tier)
# The emulator IT job (java-it below) runs entirely against Testcontainers-
# backed in-process emulators.  No GCP credentials are needed for this tier.
# Needed secrets:
#   NONE — Testcontainers spins up Docker-based emulators on the runner.
# Needed permissions:
#   contents: read   (already set at workflow level — sufficient)
#
# If live-cloud steps are added in a future ticket (T15.3), the following
# Actions secrets will be required at that point:
#   GCP_SA_KEY       — service-account JSON with BigQuery/GCS/Pub/Sub roles
#   GCP_PROJECT_ID   — target GCP project for live-cloud assertions
# Those are NOT wired here; this workflow is emulator-only.
# ============================================================================

name: CI

on:
  push:
    branches: [sprint-15, main]
  pull_request:
    branches: [sprint-15, main]

env:
  JAVA_VERSION: '21'
  PYTHON_VERSION: '3.11'

permissions:
  contents: read

# ============================================================================
# ── Job 1: Verify the Java reactor module list matches pom.xml ──────────────
# A separate guard job that diffs the workflow's explicit module list against
# the authoritative <modules> entries in data-pipeline-libraries-java/pom.xml.
# A module gap in the matrix is a visible CI failure, not a silent pass.
# ============================================================================
jobs:
  verify-module-list:
    name: Verify reactor module list is in sync with pom.xml
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check all 13 modules are enumerated
        run: |
          set -euo pipefail
          # Authoritative list from pom.xml (order-independent)
          POM_MODULES=$(grep '<module>' data-pipeline-libraries-java/pom.xml \
            | sed 's/.*<module>//;s/<\/module>//' \
            | tr -d ' ' \
            | sort)

          # Workflow's explicit matrix list (must match POM exactly)
          WORKFLOW_MODULES=$(cat <<'MODEOF'
          data-pipeline-aws-s3-java
          data-pipeline-azure-blob-java
          data-pipeline-contract-tests-java
          data-pipeline-core-java
          data-pipeline-gcp-bigquery-java
          data-pipeline-gcp-dataflow-java
          data-pipeline-gcp-gcs-java
          data-pipeline-gcp-observability-java
          data-pipeline-gcp-pubsub-java
          data-pipeline-gcp-secrets-java
          data-pipeline-it-support-java
          data-pipeline-orchestration-java
          data-pipeline-tester-java
          MODEOF
          echo "$WORKFLOW_MODULES" | tr -d ' ' | grep -v '^$' | sort)

          echo "=== POM modules ==="
          echo "$POM_MODULES"
          echo "=== Workflow modules ==="
          echo "$WORKFLOW_MODULES"

          DIFF=$(diff <(echo "$POM_MODULES") <(echo "$WORKFLOW_MODULES") || true)
          if [ -n "$DIFF" ]; then
            echo "ERROR: module list mismatch — update ci.yml matrix to match pom.xml"
            echo "$DIFF"
            exit 1
          fi
          echo "OK: all 13 modules are enumerated"

# ============================================================================
# ── Job 2: Java reactor build + unit tests ──────────────────────────────────
# Runs the full reactor (all 13 modules) via -pl <module> -am so each module
# only builds the modules it depends on, making individual matrix legs fast.
# The surefire default excludes *IT.java (integration tests) — Testcontainers
# jobs come in T15.2.
# ============================================================================
  java-build:
    name: Java — ${{ matrix.module }}
    runs-on: ubuntu-latest
    needs: verify-module-list

    strategy:
      fail-fast: false          # let all modules report; don't stop on first red
      matrix:
        module:
          - data-pipeline-core-java
          - data-pipeline-gcp-secrets-java
          - data-pipeline-gcp-bigquery-java
          - data-pipeline-gcp-gcs-java
          - data-pipeline-gcp-pubsub-java
          - data-pipeline-gcp-observability-java
          - data-pipeline-gcp-dataflow-java
          - data-pipeline-tester-java
          - data-pipeline-it-support-java
          - data-pipeline-contract-tests-java
          - data-pipeline-aws-s3-java
          - data-pipeline-azure-blob-java
          - data-pipeline-orchestration-java

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          # Key includes the pom hash so the cache busts when deps change.
          # fallback to any prior run's cache so first builds are still fast.
          key: maven-${{ hashFiles('data-pipeline-libraries-java/**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Build and test ${{ matrix.module }}
        working-directory: data-pipeline-libraries-java
        run: |
          mvn --batch-mode \
              -pl ${{ matrix.module }} \
              -am \
              test \
              -Dsurefire.failIfNoSpecifiedTests=false

# ============================================================================
# ── Job 3: Python GCP adapter tests ─────────────────────────────────────────
# Covers the three GCP adapter modules whose tests are locally green.
# Install order: data-pipeline-core first (local editable), then the adapter.
# This mirrors the pattern in the old test.yml to avoid pip resolving
# data-pipeline-core from PyPI (it is not published yet).
#
# EXCLUDED: data-pipeline-orchestration — see #88 note at the top of this file.
# ============================================================================
  python-tests:
    name: Python — ${{ matrix.module }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - module: data-pipeline-gcp-bigquery
            test-extra: test
          - module: data-pipeline-gcp-gcs
            test-extra: test
          - module: data-pipeline-gcp-pubsub
            test-extra: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.module }}-${{ hashFiles(format('data-pipeline-libraries/{0}/pyproject.toml', matrix.module)) }}
          restore-keys: |
            pip-${{ matrix.module }}-
            pip-

      - name: Install data-pipeline-core (local, no PyPI)
        run: |
          python -m pip install --upgrade pip
          pip install -e "data-pipeline-libraries/data-pipeline-core[test]"

      - name: Install ${{ matrix.module }}
        run: |
          pip install -e "data-pipeline-libraries/${{ matrix.module }}[${{ matrix.test-extra }}]"

      - name: Run pytest — ${{ matrix.module }}
        run: |
          cd "data-pipeline-libraries/${{ matrix.module }}"
          pytest tests/ -v --tb=short \
            --cov=src --cov-report=term-missing --cov-report=xml

# ============================================================================
# ── Job 4: Java emulator integration tests (T15.2 / #79) ────────────────────
#
# Runs the full reactor's *IT.java tests via maven-failsafe (activated with
# -P it) against Testcontainers-backed emulators:
#   • BigQuery  — goccy/bigquery-emulator  (BigQueryWarehouseIT,
#                                            BigQueryAuditEventPublisherIT)
#   • GCS       — fsouza/fake-gcs-server   (GcsBlobStoreIT)
#   • Pub/Sub   — gcr.io/google.com/cloudsdktool/cloud-sdk  (PubSubSinkIT,
#                                                              PubSubSourceIT)
#   • Secrets   — SecretManagerProviderIT
#   • Dataflow  — DefaultRuntimeContextWiringIT
#
# Emulator fixtures live in data-pipeline-it-support-java
# (BigQueryEmulatorContainer, FakeGcsServerContainer, and the
# testcontainers-gcloud PubSubEmulatorContainer consumed directly in the
# Pub/Sub ITs).
#
# Docker is available on ubuntu-latest runners out-of-the-box; Testcontainers
# picks up the host Docker daemon automatically — no DinD or `services:` block
# is needed.
#
# This job requires java-build (all unit tests) to pass first (explicit
# `needs:`).  If any unit-test leg is red, the IT job is skipped entirely.
#
# Required Actions secrets: NONE (emulator-only — no GCP credentials needed).
# ============================================================================
  java-it:
    name: Java — emulator ITs (mvn -P it verify)
    runs-on: ubuntu-latest
    needs: java-build           # unit tests must be green before ITs run

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          # Same key/restore pattern as java-build so the IT job benefits from
          # the same warm cache populated by the unit-test leg.
          key: maven-${{ hashFiles('data-pipeline-libraries-java/**/pom.xml') }}
          restore-keys: |
            maven-

      - name: Run integration tests against Testcontainers emulators
        working-directory: data-pipeline-libraries-java
        # Online Maven (not -o) — emulator client libs, failsafe, and
        # Testcontainers images are all network-only fetches on a cold runner.
        # Docker is available on ubuntu-latest; Testcontainers auto-detects it.
        # No GCP credentials are configured — all traffic goes to localhost
        # emulator ports, never to real GCP endpoints.
        run: |
          mvn --batch-mode \
              -P it \
              verify \
              -Dsurefire.failIfNoSpecifiedTests=false

# ============================================================================
# ── Job 5: CI gate ───────────────────────────────────────────────────────────
# Single required-status-check entry point.  PR merge gates on this job.
# Updated in T15.2 (#79) to include java-it in the gate.
# ============================================================================
  ci-gate:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [java-build, python-tests, java-it]
    if: always()

    steps:
      - name: Gate
        run: |
          echo "java-build:   ${{ needs.java-build.result }}"
          echo "python-tests: ${{ needs.python-tests.result }}"
          echo "java-it:      ${{ needs.java-it.result }}"

          if [ "${{ needs.java-build.result }}" != "success" ] || \
             [ "${{ needs.python-tests.result }}" != "success" ] || \
             [ "${{ needs.java-it.result }}" != "success" ]; then
            echo "ERROR: one or more required jobs failed"
            exit 1
          fi
          echo "All required jobs passed."
