name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

template: |
  ## Changes in this Release

  ### Features
  $CHANGES_FROM_MERGED_PRS

  ### Bug Fixes
  $CHANGES_FROM_MERGED_PRS

  ### Documentation
  $CHANGES_FROM_MERGED_PRS

  ### Breaking Changes
  $CHANGES_FROM_MERGED_PRS

  ### Chores
  $CHANGES_FROM_MERGED_PRS

  ---

  **Full Changelog:** https://github.com/${{ github.repository }}/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

categories:
  - title: Features
    labels:
      - feature
      - enhancement
  - title: Bug Fixes
    labels:
      - bug
      - bugfix
      - fix
  - title: Documentation
    labels:
      - documentation
      - docs
  - title: Breaking Changes
    labels:
      - breaking
      - breaking-change
  - title: Chores
    labels:
      - chore
      - maintenance
      - dependencies

version-resolver:
  major:
    labels:
      - breaking
      - breaking-change
  minor:
    labels:
      - feature
      - enhancement
  patch:
    labels:
      - bug
      - bugfix
      - fix
      - chore
      - documentation

autolabeler:
  - label: feature
    title:
      - '/^feat(\(.+\))?:/i'
  - label: fix
    title:
      - '/^fix(\(.+\))?:/i'
  - label: documentation
    title:
      - '/^docs(\(.+\))?:/i'
  - label: chore
    title:
      - '/^chore(\(.+\))?:/i'
  - label: breaking-change
    title:
      - '/^feat\!:/i'
      - '/^fix\!:/i'
